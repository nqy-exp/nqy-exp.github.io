<script>
document.addEventListener('DOMContentLoaded', function() {
    const btn = document.getElementById('hamburgerBtn');
    const sidebar = document.getElementById('sidebarDrawer'); 
    const quickNav = document.getElementById('mobileQuickNav'); 

    // --- 功能 A: 汉堡按钮点击逻辑 ---
    if (btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation(); // 【极其重要】阻止事件冒泡到 document，否则会立刻触发下面的“关闭”逻辑
            
            if (sidebar && document.body.contains(sidebar)) {
                sidebar.classList.toggle('is-open');
            } else if (quickNav) {
                quickNav.classList.toggle('is-active');
            }
            btn.classList.toggle('is-open');
        });
    }

    // --- 功能 B: 【核心】智能检测点击侧边栏外部 ---
    document.addEventListener('click', function(e) {
        // 1. 处理侧边栏 (Sidebar) 的情况
        if (sidebar && sidebar.classList.contains('is-open')) {
            // 如果点击的对象【既不是】侧边栏本身，【也不是】汉堡按钮
            // 说明用户是在“点击外部”
            if (!sidebar.contains(e.target) && !btn.contains(e.target)) {
                sidebar.classList.remove('is-open');
                if (btn) btn.classList.remove('is-open'); // 同时把汉堡按钮变回三横线
            }
        }

        // 2. 处理快速导航 (QuickNav) 的情况 (可选，如果你也希望点击外面关闭它)
        if (quickNav && quickNav.classList.contains('is-active')) {
            if (!quickNav.contains(e.target) && !btn.contains(e.target)) {
                quickNav.classList.remove('is-active');
                if (btn) btn.classList.remove('is-open');
            }
        }
    });

    // --- 功能 C: 点击内部链接自动关闭 ---
    if (quickNav) {
        quickNav.addEventListener('click', function(e) {
            if (e.target.tagName === 'A') {
                setTimeout(() => { quickNav.classList.remove('is-active'); }, 250);
            }
        });
    }

    if (sidebar) {
        sidebar.addEventListener('click', function(e) {
            if (e.target.tagName === 'A') {
                setTimeout(() => { 
                    sidebar.classList.remove('is-open');
                    // 这里不再需要操作 overlay 了
                }, 250);
            }
        });
    }
});
</script>
