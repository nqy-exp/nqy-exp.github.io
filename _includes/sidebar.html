<!-- sidebar.html -->
<aside class="sidebar">
  <!-- 1. 标题部分 -->
  <h3 class="sidebar-title">
    <a href="/ideas/" style="text-decoration: none; color: inherit;">Jibber-Jabber</a>
  </h3>

  <ul class="sidebar-list">
    {% for item in site.ideas %}
      <!-- 调试模式：把每个文件的真实路径印出来，方便我们排查 -->
      <li style="font-size: 10px; color: red; list-style: none;">
        DEBUG PATH: {{ item.url }}
      </li>

      <!-- 原有的判断逻辑 -->
      {% if item.url != "/ideas/" %}
        <li class="sidebar-item">
          <a href="{{ item.url }}" class="sidebar-link {% if page.url == item.url %}active{% endif %}">
            {{ item.title }}
          </a>
        </li>
      {% endif %}
    {% endfor %}
  </ul>
</aside>

<style>
/* 保持你原有的所有样式不变 */
.sidebar {
  width: 250px;
  padding: 20px;
  border-right: 1px solid #eee;
  height: calc(100vh - 80px);
  position: sticky;
  top: 80px;
  overflow-y: auto;
}

.sidebar-title {
  font-size: 1em;
  color: #333;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 2px solid #e67e22;
}

.sidebar-list {
  list-style: none;
  padding: 0;
  margin: 0;
}

.sidebar-item {
  margin-bottom: 12px;
}

.sidebar-link {
  text-decoration: none;
  color: #666;
  font-size: 0.95em;
  transition: all 0.3s;
  display: block;
}

.sidebar-link.active {
  color: #e67e22 !important;
  font-weight: bold;
  padding-left: 5px;
}

.sidebar-link:hover {
  color: #e67e22;
  padding-left: 5px;
}
</style>
