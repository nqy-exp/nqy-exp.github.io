<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
   <!-- --- Favicon 区域 (单文件极简版) --- -->
  <!-- 我们直接把所有的图标需求都指向这一张高清图 -->
  <link rel="icon" type="image/png" href="{{ '/images/favicon-180x180.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/images/favicon-180x180.png' | relative_url }}">
  <!-- --- Favicon 区域结束 --- -->
  
  <!-- 引入我们在上面定义的 CSS -->
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

  <!-- 1. 顶部导航栏 (包含汉堡包按钮) -->
  {% include header.html %}



  <!-- 2. 主内容区 (每个页面的具体内容) -->
  <main class="main-content">
    {{ content }}
  </main>

  <!-- 3. 页脚 -->
  {% include footer.html %}

</body>
</html>
