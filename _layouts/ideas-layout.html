<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

  {% include header.html %} <!-- 引入全局页眉 -->

  <main class="layout-container_split">
    <!-- 左侧侧边栏 -->
    <aside class="sidebar">
      <h3 class="sidebar-title">Jibber-Jabber</h3>
      <ul class="sidebar-list">
        {% for item in site.ideas %}
          <li class="sidebar-item">
            <a href="{{ item.url }}" class="sidebar-link {% if page.url == item.url %}active{% endif %}">
              {{ item.title }}
            </a>
          </li>
        {% endfor %}
      </ul>
    </aside>

    <!-- 右侧内容区 -->
    <article class="main-content">
      <!-- 自动显示文章标题 -->
      <h1 style="margin-top: 0;">{{ page.title }}</h1>
      <!-- 自动显示日期 -->
      <p style="color: #999; font-size: 0.9em;">{{ page.date | date: "%Y-%m-%d" }}</p>
      
      <hr> <!-- 分割线 -->

      <!-- 这里是 Markdown 的正文内容 -->
      <div class="post-content">
        {{ content }}
      </div>
    </article>
  </main>

  {% include footer.html %} <!-- 引入全局页脚 -->

</body>
</html>
