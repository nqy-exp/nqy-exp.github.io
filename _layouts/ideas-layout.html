<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

  {% include header.html %} <!-- 引入全局页眉 -->

  <!-- 使用 Flex 布局实现：左侧侧边栏 + 右侧内容区 -->
  <main class="layout-container_split">
    
    <!-- 【关键改动】：不再手写列表，而是直接调用零件 -->
    {% include sidebar.html %}

    <!-- 右侧内容区 -->
    <article class="main-content">
      <!-- 自动显示文章标题 -->
      <h1 style="margin-top: 0;">{{ page.title }}</h1>
      <!-- 自动显示日期 -->
      {% if page.date %}
        <p style="color: #999; font-size: 0.9em;">{{ page.date | date: "%Y-%m-%d" }}</p>
      {% endif %}
      
      <hr> <!-- 分割线 -->

      <!-- 这里是 Markdown 的正文内容 -->
      <div class="post-content">
        {{ content }}
      </div>
    </article>

  </main>

  {% include footer.html %} <!-- 引入全局页脚 -->

</body>
</html>
