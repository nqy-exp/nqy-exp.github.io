<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

  {% include header.html %}

  <!-- 使用 Flex 布局实现：左侧侧边栏 + 右侧内容区 -->
  <main class="layout-container_split">
    
    <!-- 召唤自动识别项目的侧边栏 -->
    {% include sidebar.html %}

    <!-- 右侧主内容区 -->
    <article class="main-content">
      <h1 style="margin-top: 0;">{{ page.title }}</h1>
      
      {% if page.date %}
        <p style="color: #999; font-size: 0.9em;">{{ page.date | date: "%Y-%m-%d" }}</p>
      {% endif %}

      <hr>

      <!-- 文章正文内容 -->
      <div class="post-content">
        {{ content }}
      </div>
    </article>

  </main>

  {% include footer.html %}

</body>
</html>
