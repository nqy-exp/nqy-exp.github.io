<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ | Niu Qiyue</title>
<link rel="stylesheet" href="/assets/css/style.css">
<style>
/* 基础容器 */
body { margin: 0; padding: 0; background-color: #fff; }

.container {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 20px;
}

/* --- 大标题装饰样式 (与前面页面保持一致) --- */
.main-title {
    text-align: center;
    font-size: 2.5em;
    color: #333;
    position: relative; 
    padding-bottom: 25px; 
    margin-bottom: 50px;  
}

.main-title::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: 0;
    transform: translateX(-50%);
    width: 60%;
    height: 3px;
    background-color: #e67e22;
    box-shadow: 0 4px 8px rgba(230, 126, 34, 0.4);
    border-radius: 2px;
}

/* 手风琴容器 */
.faq-section { margin-bottom: 40px; }

/* --- 问题样式 (Summary) 与悬停交互增强 --- */
details {
    margin-bottom: 15px;
    border-bottom: 1px solid #eee;
    padding-bottom: 5px;
    border-radius: 8px;      /* 增加圆角，让卡片感更强 */
    transition: all 0.3s ease; /* 让背景色变化平滑 */
}

/* 【核心修改】：当鼠标悬停在问题上时，整个框变淡橙色 */
details:hover {
    background-color: #fffcf5; /* 淡淡的品牌橙色背景 */
    border-bottom: 1px solid #ffeeba; /* 底边线也变成浅橙色 */
}

/* 【核心修改】：当问题展开时，颜色稍微深一点点 */
details[open] {
    background-color: #fffaf0;
    border-bottom: 1px solid #ffeeba;
}

summary {
    list-style: none; 
    cursor: pointer;
    outline: none;
    padding: 15px 12px; /* 增加了左右边距，让背景色看起来更饱满 */
}

summary::-webkit-details-marker { display: none; }

/* 问题中的文字层级 */
.q-en {
    display: block;
    font-size: 1.1em;
    font-weight: bold;
    color: #333;
    margin-bottom: 4px;
}

.q-zh {
    display: block;
    font-size: 0.85em;
    color: #888;
}

/* 问题右侧的指示器 (+ / -) */
summary::after {
    content: '+';
    float: right;
    color: #e67e22;
    font-size: 1.2em;
    transition: transform 0.3s ease;
}

details[open] summary::after {
    content: '−';
    transform: rotate(180deg);
}

/* 回答内容样式 */
.answer-container {
    padding: 5px 12px 15px 12px; /* 统一左右内边距，与 summary 对齐 */
    margin: 0;                  /* 去掉 margin，因为背景已经由 details 提供 */
    background-color: transparent; /* 【核心】：改为透明，让它直接显示 details 的底色 */
    border-radius: 0;           /* 移除内部圆角，避免视觉重叠 */
}

.a-en {
    font-size: 1em;
    color: #333;
    margin-bottom: 6px;
    line-height: 1.6;
}

.a-zh {
    font-size: 0.85em;
    color: #888;
    line-height: 1.5;
}


/* 返回链接 */
.back-link {
    display: block;
    text-align: center;
    margin-top: 60px;
    color: #999;
    text-decoration: none;
    font-size: 0.9em;
    transition: color 0.2s;
}

.back-link:hover { color: #e67e22; }
</style>
</head>
<body>

<div class="container">
<h1 class="main-title">FAQ | Niu Qiyue</h1>

<div class="faq-section">

<details>

<span class="q-zh">我该如何联系你？</span>
</summary>

<p class="a-zh">你可以通过邮件联系我：nqy.pro@outlook.com</p>
</div>
</details>

</body>
</html>
